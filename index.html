<!DOCTYPE html>
<html lang="en-KE">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Primary SEO -->
    <title>Ehailers Foundation | Transforming Transport in Kenya</title>
    <meta name="description" content="Ehailers Foundation is a Kenya-based organization committed to transforming the transport industry through innovation, policy advocacy, and strategic partnerships. We support digital transport operators, drivers, and stakeholders by providing regulatory guidance, promoting fair compensation, and enhancing mobility systems. Our work spans Nairobi and other regions, driving sustainable, inclusive, and technology-enabled transport solutions across Kenya." />
    <meta name="keywords" content="Ehailers Foundation, Kenya transport, Nairobi mobility, ride hailing Kenya, taxi technology Kenya, driver empowerment Kenya, transport innovation Africa" />
    <meta name="author" content="Ehailers Foundation" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.ehailersfoundation.org/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Geo Targeting -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Nairobi" />
    <meta name="geo.position" content="-1.286389;36.817223" />
    <meta name="ICBM" content="-1.286389, 36.817223" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ehailers Foundation" />
    <meta property="og:description" content="Transforming Kenya’s transport ecosystem through innovation, policy engagement, and digital solutions." />
    <meta property="og:url" content="https://www.ehailersfoundation.org/" />
    <meta property="og:image" content="https://www.ehailersfoundation.org/preview.png" />
    <meta property="og:site_name" content="Ehailers Foundation" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ehailers Foundation" />
    <meta name="twitter:description" content="Empowering transport communities in Kenya through technology and partnerships." />
    <meta name="twitter:image" content="https://www.ehailersfoundation.org/preview.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Preload -->
    <link rel="preload" as="image" href="/preview.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "Ehailers Foundation",
      "url": "https://www.ehailersfoundation.org/",
      "logo": "https://www.ehailersfoundation.org/favicon.png",
      "description": "A Kenya-based foundation improving transport systems through digital innovation, advocacy, and driver empowerment.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Nairobi, Kenya"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+254721217577",
        "contactType": "customer support",
        "areaServed": "KE"
      },
      "sameAs": [
        "https://www.linkedin.com",
        "https://www.twitter.com"
      ]
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
