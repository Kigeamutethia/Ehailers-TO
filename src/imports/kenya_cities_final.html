    <style>
        /* Pulse Animation Style */
        .pulse-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #36ac43; /* Green circular wave color */
            border-radius: 50%;
            pointer-events: none; /* Let clicks pass through the animation */
            animation: pulse-wave 1s ease-out infinite;
            transform: translate(-50%, -50%); /* Center the animation */
            opacity: 0;
            z-index: 1000;
        }

        @keyframes pulse-wave {
            0% {
                width: 20px;
                height: 20px;
                opacity: 1;
            }
            100% {
                width: 80px; /* Expanding wave diameter */
                height: 80px;
                opacity: 0;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Find all marker icon elements on the map
            var markers = document.querySelectorAll('.leaflet-marker-icon');

            markers.forEach(function(marker) {
                marker.addEventListener('click', function(event) {
                    // Remove any existing pulse animation when clicking a new marker
                    var existingPulse = document.querySelector('.pulse-marker');
                    if (existingPulse) {
                        existingPulse.remove();
                    }

                    // Create the HTML element for the pulse wave
                    var pulse = document.createElement('div');
                    pulse.className = 'pulse-marker';

                    // Position the animation relative to the marker's coordinates
                    pulse.style.left = event.originalEvent.pageX + 'px';
                    pulse.style.top = event.originalEvent.pageY + 'px';

                    // Add the animation element to the map body
                    document.body.appendChild(pulse);

                    // Optional: Remove the pulse element after 1 second (one animation cycle)
                    setTimeout(function() {
                        if (pulse) {
                            pulse.remove();
                        }
                    }, 1000); // 1 second
                });
            });
        });
    </script>
